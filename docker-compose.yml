version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

# Removed massive_mcp standalone container as it's run via stdio subprocess inside the backend container.
