<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="FRIDAY: Advanced Mobile & Desktop Trading Terminal">
    <meta name="theme-color" content="#1a1a1a">
    <title>FRIDAY | Trading Terminal v12.2 (Scout)</title>
    
    <!-- --- 1. External Dependencies (CDN) --- -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>dayjs.extend(window.dayjs_plugin_relativeTime);</script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { black: '#1a1a1a', gray: '#f3f4f6', accent: '#fbbf24' },
                        trade: { up: '#22c55e', down: '#ef4444', upBg: '#f0fdf4', downBg: '#fef2f2' },
                        ai: { main: '#8b5cf6', light: '#f3e8ff', dark: '#5b21b6' }
                    },
                    fontFamily: { sans: ['Inter', '-apple-system', 'sans-serif'] },
                    screens: { 'dt': '850px' }
                }
            }
        }
    </script>

    <!-- --- 2. Local Styles --- -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-800">

    <!-- Preloader -->
    <div id="preloader"><div class="spinner"></div></div>

    <!-- Main Application Frame -->
    <div id="app-frame"></div>
    
    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <!-- AI Insights Modal -->
    <div id="ai-modal" class="fixed inset-0 z-[70] hidden justify-center items-center bg-black/50 backdrop-blur-sm p-4 fade-in" onclick="if(event.target===this) App.UI.toggleAI(false)">
        <div class="bg-white rounded-2xl w-full max-w-[600px] flex flex-col shadow-2xl overflow-hidden max-h-[85vh]">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-white">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-ai-light text-ai-main flex items-center justify-center"><i class="fa-solid fa-binoculars"></i></div>
                    <h2 class="font-black text-lg text-gray-900 tracking-tight">Scout Report</h2>
                </div>
                <button onclick="App.UI.toggleAI(false)" class="w-8 h-8 bg-gray-50 rounded-full hover:bg-gray-100 transition flex items-center justify-center text-gray-500"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto bg-gray-50/50">
                <div id="ai-content" class="ai-markdown">
                    <div class="flex flex-col items-center justify-center py-8 gap-4">
                        <div class="spinner !border-ai-light !border-t-ai-main"></div>
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest animate-pulse">Scouting Market Data...</p>
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-gray-100 bg-white text-center">
                <p class="text-[10px] text-gray-400 font-medium">Powered by Google Gemini 2.5 Flash • Not Financial Advice</p>
            </div>
        </div>
    </div>

    <!-- Indicator Library & Comparison Modal -->
    <div id="ind-library" class="fixed inset-0 z-[60] hidden justify-center items-end dt:items-center bg-black/40 backdrop-blur-sm transition-opacity" onclick="if(event.target===this) App.UI.toggleLibrary(false)">
        <div class="bg-white rounded-t-2xl dt:rounded-2xl w-full max-w-[430px] dt:max-w-[500px] flex flex-col shadow-2xl overflow-hidden dt:h-auto max-h-[85vh]">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 class="font-bold text-lg">Indicator Library</h2>
                <div class="flex items-center gap-3">
                    <button onclick="App.Charts.clearAll()" class="text-xs font-bold text-red-500 hover:text-red-700 uppercase tracking-wide px-2 py-1 rounded hover:bg-red-50 transition">Clear All</button>
                    <button onclick="App.UI.toggleLibrary(false)" class="w-8 h-8 bg-gray-100 rounded-full hover:bg-gray-200 transition flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>
            
            <div class="p-4 border-b border-gray-100 bg-gray-50 flex items-center justify-between sticky top-[60px] z-10">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Input Config</span>
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-gray-700">Length:</label>
                    <input type="number" id="ind-period" value="20" oninput="App.Charts.updateActiveIndicators()" class="w-16 p-1 text-center font-bold border border-gray-300 rounded text-sm focus:outline-none focus:border-black shadow-sm">
                </div>
            </div>

            <!-- Comparison Search -->
            <div class="p-4 border-b border-gray-100 bg-white">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Compare Ticker</h3>
                <div class="flex gap-2">
                    <input type="text" id="cmp-input" placeholder="Ticker (e.g. SPY)" class="flex-1 p-2 border border-gray-200 rounded text-sm focus:outline-none focus:border-black uppercase font-bold">
                    <button onclick="App.Charts.addComparison(document.getElementById('cmp-input').value)" class="bg-black text-white px-3 rounded text-xs font-bold hover:bg-gray-800 transition">Add</button>
                </div>
            </div>

            <div class="overflow-y-auto p-6 pb-20 dt:pb-6">
                <!-- Trend Indicators -->
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">📈 Trend</h3>
                <div class="grid grid-cols-1 gap-3 mb-6">
                    <button id="btn-SMA" onclick="App.Charts.toggleOverlay('SMA')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center mr-3"><i class="fa-solid fa-wave-square"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">SMA</h4><p class="text-[10px] text-gray-500">Simple Moving Average</p></div>
                    </button>
                    <button id="btn-EMA" onclick="App.Charts.toggleOverlay('EMA')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-purple-50 text-purple-600 flex items-center justify-center mr-3"><i class="fa-solid fa-bolt"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">EMA</h4><p class="text-[10px] text-gray-500">Exponential Moving Average</p></div>
                    </button>
                    <button id="btn-Supertrend" onclick="App.Charts.toggleOverlay('Supertrend')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-green-50 text-green-600 flex items-center justify-center mr-3"><i class="fa-solid fa-traffic-light"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">Supertrend</h4><p class="text-[10px] text-gray-500">Trend Following</p></div>
                    </button>
                    <button id="btn-VWAP" onclick="App.Charts.toggleOverlay('VWAP')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-yellow-50 text-yellow-600 flex items-center justify-center mr-3"><i class="fa-solid fa-scale-balanced"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">VWAP</h4><p class="text-[10px] text-gray-500">Volume Weighted Average</p></div>
                    </button>
                </div>

                <!-- Momentum Indicators -->
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">⚡ Momentum</h3>
                <div class="grid grid-cols-1 gap-3 mb-6">
                    <button id="btn-RSI" onclick="App.Charts.toggleBottom('RSI')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-orange-50 text-orange-600 flex items-center justify-center mr-3"><i class="fa-solid fa-gauge-high"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">RSI</h4><p class="text-[10px] text-gray-500">Relative Strength Index</p></div>
                    </button>
                    <button id="btn-MACD" onclick="App.Charts.toggleBottom('MACD')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-teal-50 text-teal-600 flex items-center justify-center mr-3"><i class="fa-solid fa-sliders"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">MACD</h4><p class="text-[10px] text-gray-500">Moving Avg Convergence</p></div>
                    </button>
                </div>

                <!-- Volatility Indicators -->
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">🌪️ Volatility</h3>
                <div class="grid grid-cols-1 gap-3">
                    <button id="btn-Bollinger" onclick="App.Charts.toggleOverlay('Bollinger')" class="ind-btn flex items-center p-3 rounded-xl group text-left bg-white">
                        <div class="icon-box w-10 h-10 rounded-lg bg-indigo-50 text-indigo-600 flex items-center justify-center mr-3"><i class="fa-solid fa-cloud"></i></div>
                        <div><h4 class="font-bold text-sm text-gray-900">Bollinger Bands</h4><p class="text-[10px] text-gray-500">Standard Deviation Bands</p></div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- --- 3. JavaScript Modules (ESM) --- -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
